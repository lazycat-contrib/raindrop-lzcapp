version: 1

project:
  root: .
  build_config: lzc-build.yml
  package_file: package.yml
  output: .lazycat-build/raindrop.lpk
  target_arch: amd64

update:
  strategy: publish
  allow_downgrade: false
  version_source:
    type: image
    image: raindrop

build:
  toolchains: []
  run_buildscript: false

images:
  - id: raindrop
    target: service
    service: raindrop
    source: czyt/raindrop
    channel: stable
    sort: semver
    tag_regex: '^v\d+\.\d+\.\d+$'
    version_regex: '^v(?P<version>\d+\.\d+\.\d+)$'
    version_template: '{version}'
    delivery:
      mode: lazycat

stores:
  official:
    enabled: true
    skip_if_version_exists: true
    create_if_missing: true
    changelog_locales: [zh, en]
    retry:
      enabled: false
      max_attempts: 3
      initial_delay: 2s
      max_delay: 30s
    application:
      language: zh
      name: Raindrop
      source: https://github.com/ca-x/raindrop
      source_author: ca-x
  private:
    enabled: true
    skip_if_version_exists: true
    name: Raindrop
    summary: Published from GitHub Actions
